<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #1c1c1c;
            color: #fff;
            text-align: center;
            padding-top: 50px;
        }
        .btn {
            background-color: #ff4081;
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 20px 2px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .btn:hover {
            background-color: #ff1a6b;
        }
    </style>

    <!-- AuthPro SDK -->
    <script type="text/javascript" src="https://www.authpro.com/auth/CoolD1234/?action=pp"></script>

    <!-- Download Canny SDK -->
    <script>!function(w,d,i,s){function l(){if(!d.getElementById(i)){var f=d.getElementsByTagName(s)[0],e=d.createElement(s);e.type="text/javascript",e.async=!0,e.src="https://canny.io/sdk.js",f.parentNode.insertBefore(e,f)}}if("function"!=typeof w.Canny){var c=function(){c.q.push(arguments)};c.q=[],w.Canny=c,"complete"===d.readyState?l():w.attachEvent?w.attachEvent("onload",l):w.addEventListener("load",l,!1)}}(window,document,"canny-jssdk","script");</script>

    <script>
    // AuthPro user data callback
    function onAuthProLoad() {
        // Assuming the user data is loaded into AuthPro's object (check AuthPro's documentation for exact details)
        var email = AuthProUser.email;
        var login = AuthProUser.username; 
        var avatarURL = AuthProUser.avatar || '';
        var created = AuthProUser.created || new Date().toISOString(); // Using current date if user creation date is missing

        // Identify user with Canny
        Canny('identify', {
            appID: '6719e33ffede910142f309b1',
            user: {
                email: email,
                name: login,
                id: login,
                avatarURL: avatarURL,
                created: new Date(created).toISOString()
            }
        });
    }

    // Ensure AuthPro data is loaded before running Canny identification
    window.onload = function() {
        if (typeof AuthProUser !== 'undefined') {
            onAuthProLoad();
        }
    };
    </script>
</head>
<body>
    <h1>Welcome to NeonWave Arcade Feature Request</h1>
    <p>Help us improve by suggesting new features!</p>
    <button class="btn" onclick="window.location.href='https://neonwave.canny.io/game-requests'">Request a Feature</button>
</body>
</html>
