<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="styles.css">
    <style>
      body {
        margin: 0;
        font-family: poppins;
        background-color: #1c1c1c;
        color: #fff;
      }
      .navbar {
        width: 100%;
        height: 50px;
        background-color: #333;
        display: flex;
        align-items: center;
        padding: 0 20px;
      }
      .navbar a {
        color: #fff;
        text-decoration: none;
        margin-right: 20px;
      }
      .iframe-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: calc(100vh - 50px);
        position: relative;
        margin-top: 50px;
      }
      .game-iframe {
        width: 80%;
        height: 80%;
        border: none;
        border-radius: 15px;
        position: relative;
      }
      .fullscreen-btn {
        position: absolute;
        bottom: 10px;
        right: 10px;
        padding: 10px;
        background-color: rgba(0, 0, 0, 0.5);
        color: white;
        border: none;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .fullscreen-btn img {
        width: 20px;
        height: 20px;
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <a href="#">Home</a>
      <a href="#">Games</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </div>
    <div class="iframe-container">
      <iframe class="game-iframe" id="game-iframe" src=""></iframe>
      <button class="fullscreen-btn" id="fullscreen-btn">
        <img src="fullscreen-icon.png" alt="Fullscreen">
      </button>
    </div>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const gameIframe = document.getElementById('game-iframe');
        const gameUrl = window.location.hash.substring(1); // Get the game URL from the hash
        if (gameUrl) {
          gameIframe.src = gameUrl;
        } else {
          gameIframe.src = '/error.html'; // Set a default error page if no game URL is found
        }

        const fullscreenBtn = document.getElementById('fullscreen-btn');
        fullscreenBtn.addEventListener('click', () => {
          if (gameIframe.requestFullscreen) {
            gameIframe.requestFullscreen();
          } else if (gameIframe.mozRequestFullScreen) { // Firefox
            gameIframe.mozRequestFullScreen();
          } else if (gameIframe.webkitRequestFullscreen) { // Chrome, Safari and Opera
            gameIframe.webkitRequestFullscreen();
          } else if (gameIframe.msRequestFullscreen) { // IE/Edge
            gameIframe.msRequestFullscreen();
          }
        });
      });
    </script>
  </body>
</html>
