<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <div id="head-placeholder"></div>
    <script src="/scripts/common.js"></script>
</head>
<body>
    <div id="navbar-placeholder"></div>
    <div class="ad-game-container">
        <div class="ad-section vertical-ad left-ad" style="margin-top: 10px; height: 1000px">
            <ins class="adsbygoogle" style="display:inline-block;width:130px;height:500px" data-ad-client="ca-pub-2197905823374701" data-ad-slot="2138675228"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
        <div class="iframe-container">
            <iframe class="game-iframe" id="game-iframe" src="" allow="fullscreen"></iframe>
            <button class="fullscreen-btn" id="fullscreen-btn">Fullscreen</button>
        </div>
        <div class="ad-section vertical-ad right-ad" style="margin-top: 10px; height: 1000px">
            <ins class="adsbygoogle" style="display:inline-block;width:130px;height:500px" data-ad-client="ca-pub-2197905823374701" data-ad-slot="2138675228"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
    </div>
    <div id="debug-info" style="margin: 20px; font-family: Arial, sans-serif;">
        <p>Current Game URL: <span id="debug-url">Loading...</span></p>
    </div>
    <script src="/scripts/game-player.js"></script>
</body>
</html>
