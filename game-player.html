<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        font-family: poppins;
        font-size: 700;
        background-color: #1c1c1c;
        color: #fff;
      }
      .iframe-container {
        display: flex;
        justify-content: center;
        align-items: top;
        height: 100vh;
        position: relative;
        padding: 10px;
      }
      .game-iframe {
        width: 100%;
        height: 100%;
        border: none;
        border-radius: 15px;
      }
      .fullscreen-btn {
        position: absolute;
        bottom: 1px;
        left: 1px;
        padding: 10px 20px;
        background-color: #ff6600;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

            ul {
            list-style-type: none;
            margin: 10px;
            padding: 5px;
            padding-top: 6px;
            border-radius: 10px;
            overflow: hidden;
            background-color: #333;
            position: sticky;
            position: -webkit-sticky; /* Safari */
            }

            li {
            float: left;
            padding-left: 4px;
            }

            li a {
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            border-radius: 5px;
            }

            /* Change the link color to #111 (black) on hover */
            li a:hover {
            background-color: #111;
            }

            .active {
            background-color: #04AA6D;
            }

            .logo {
            width: auto;
            height: 45px;
            padding: 4px 4px;
            float: left;
            }

            .welcome-msg {
            border-radius: 10px;
            background-color: #333;
            margin: 10px;
            padding: 10px;
            }

            .welcome-msg-text {
            margin: 1px;
            }

            .inline-text-welcome-msg-gradient {
            display: inline;
            margin: 1px;
            background: #09CF0D;
            background: linear-gradient(to right, #09CF0D 0%, #06CFC5 57%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            }

            .inline-text-welcome-msg {
            display: inline;
            margin: 1px;
            }

            .signup-btn {
            background: #09CF0D;
            background: linear-gradient(to right, #09CF0D 0%, #06CFC5 57%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            float: right;
            border-style: solid;
            border-color: #09CF0D;
            border-color: linear-gradient(to right, #09CF0D 0%, #06CFC5 57%);
            border-width: 1px;
            }

            .signup-btn:hover {
            color: #fff;
            }
    </style>
  </head>
  <body>
    <ul>
            <img href="index.html" class="logo" src="/img/neonwave-logo.png">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="categories.html">Categories</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li style="float: right;"><a class="signup-btn" href="#authpro.login">Log in or Sign up</a></li>
        </ul> 
    <div class="iframe-container">
      <iframe class="game-iframe" id="game-iframe" src=""></iframe>
      <button class="fullscreen-btn" id="fullscreen-btn">Fullscreen</button>
    </div>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const gameIframe = document.getElementById('game-iframe');
        const gameUrl = window.location.hash.substring(1); // Get the game URL from the hash
        if (gameUrl) {
          gameIframe.src = gameUrl;
        } else {
          gameIframe.src = '/error.html'; // Set a default error page if no game URL is found
        }

        const fullscreenBtn = document.getElementById('fullscreen-btn');
        fullscreenBtn.addEventListener('click', () => {
          if (gameIframe.requestFullscreen) {
            gameIframe.requestFullscreen();
          } else if (gameIframe.mozRequestFullScreen) { // Firefox
            gameIframe.mozRequestFullScreen();
          } else if (gameIframe.webkitRequestFullscreen) { // Chrome, Safari and Opera
            gameIframe.webkitRequestFullscreen();
          } else if (gameIframe.msRequestFullscreen) { // IE/Edge
            gameIframe.msRequestFullscreen();
          }
        });
      });
    </script>
  </body>
</html>
