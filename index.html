
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonWave - Modern Gaming Website</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.authpro.com/js/auth.js"></script>
    <script>
        var ap = new AuthPro('CoolD1234');
    </script>
</head>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
        <img src="neonwave-logo.png" alt="NeonWave Logo" class="logo">
    </div>

    <header>
        <nav>
            <div class="nav-links">
                <a href="#home">Home</a>
                <a href="#ai">AI</a>
                <a href="#proxies">Proxies</a>
                <a href="#developers">Developers</a>
            </div>
            <div class="nav-buttons">
                <a href='authpro:login' class="login-btn">Login / Signup</a>
                <button id="search-btn" aria-label="Search">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>
        </nav>
        <div id="search-container" class="hidden">
            <input type="text" id="search-input" placeholder="Search games...">
        </div>
    </header>

    <main>
        <section id="home" class="active">
            <div class="game-grid">
                <!-- Game tiles will be dynamically inserted here -->
            </div>
        </section>

        <section id="ai" class="hidden">
            <div class="loading-container">
                <div class="spinner"></div>
            </div>
            <iframe src="ai-embed-url" frameborder="0"></iframe>
        </section>

        <section id="proxies" class="hidden">
            <div class="loading-container">
                <div class="spinner"></div>
            </div>
            <iframe src="proxies-embed-url" frameborder="0"></iframe>
        </section>

        <section id="developers" class="hidden">
            <h2>Coming Soon</h2>
            <p>Our developers section is under construction. Stay tuned for exciting updates!</p>
        </section>
    </main>

    <div id="game-modal" class="hidden">
        <button id="back-btn" aria-label="Back">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </button>
        <div class="game-content">
            <!-- Game details will be dynamically inserted here -->
        </div>
        <div class="recommended-games">
            <!-- Recommended games will be dynamically inserted heres -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
