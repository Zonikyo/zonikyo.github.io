<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonWave Arcade</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1c1c1c;
            color: #ffffff;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
            border-radius: 8px;
            background: #333;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        h1 {
            margin: 0;
            font-size: 2rem;
        }
        p {
            margin-top: 10px;
            font-size: 1.1rem;
            color: #dddddd;
        }
        .redirect-button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 700;
            color: #ffffff;
            background-color: #5a67d8;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .redirect-button:hover {
            background-color: #4c51bf;
        }
    </style>
    <script>
        setTimeout(() => {
            window.location.href = "https://sites.google.com/view/neonwave";
        }, 5000);
    </script>
</head>
<body>
    <div class="container">
        <h1>Welcome to NeonWave Arcade</h1>
        <p>Redirecting you to the main site... Please wait a moment.</p>
        <button class="redirect-button" onclick="window.location.href='https://sites.google.com/view/neonwave'">
            Proceed to NeonWave Arcade
        </button>
    </div>
</body>
</html>
