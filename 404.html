<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="styles.css">
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #1c1c1c;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        flex-direction: column;
      }
      .error-container {
        text-align: center;
      }
      .error-code {
        font-size: 10rem;
        margin: 0;
      }
      .error-message {
        font-size: 2rem;
        margin: 0;
      }
      .home-button {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 1rem;
        color: #fff;
        background-color: #ff6600;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        text-decoration: none;
      }
      .home-button:hover {
        background-color: #e65c00;
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <h1 class="error-code">404</h1>
      <p class="error-message">Page Not Found</p>
      <a href="/" class="home-button">Go Back Home</a>
    </div>
  </body>
</html>
