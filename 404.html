<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="styles.css">
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes fadeSlideDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #1c1c1c;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        flex-direction: column;
      }
      .error-container {
        text-align: center;
      }
      .error-code {
        font-size: 10rem;
        margin: 0;
        animation: fadeIn 1s ease-in-out;
      }
      .error-code span {
        display: inline-block;
        animation: fadeIn 1s ease-in-out;
      }
      .error-code span:nth-child(1) {
        animation-delay: 0.2s;
      }
      .error-code span:nth-child(2) {
        animation-delay: 0.4s;
      }
      .error-code span:nth-child(3) {
        animation-delay: 0.6s;
      }
      .error-message {
        font-size: 2rem;
        margin: 0;
        animation: fadeSlideDown 1s ease-in-out 0.8s;
      }
      .home-button {
        margin-top: 40px; /* Adjusted to ensure no overlap */
        padding: 10px 20px;
        font-size: 1rem;
        color: #fff;
        background-color: #ff6600;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        text-decoration: none;
        animation: fadeSlideDown 1s ease-in-out 1s;
      }
      .home-button:hover {
        background-color: #e65c00;
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <h1 class="error-code">
        <span>4</span><span>0</span><span>4</span>
      </h1>
      <p class="error-message">Page Not Found</p>
      <a href="/" class="home-button">Go Back Home</a>
    </div>
  </body>
</html>
