<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            background-color: #1c1c1c;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .game-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            padding: 20px;
        }
        .game-tile {
            position: relative;
            width: 200px;
            height: 300px;
            background-color: #333;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .game-tile:hover {
            transform: scale(1.05);
        }
        .game-tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .game-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .game-tile:hover .game-info {
            opacity: 1;
        }
        .game-title {
            font-size: 18px;
            font-weight: bold;
            margin: 0;
        }
        .game-description {
            font-size: 14px;
            margin: 5px 0 0;
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer"></div>
    <script>
        async function fetchGames() {
            try {
                // Dynamically fetch the games-data.js file
                const response = await fetch('https://zonikyo.github.io/scripts/games-data.js');
                
                // Check if the response is valid
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }

                // Extract the JavaScript content as text
                const scriptText = await response.text();

                // Evaluate the script to extract the gamesData array
                const gamesData = new Function(`${scriptText}; return gamesData;`)();

                // Debugging: Log the fetched data
                console.log('Fetched games data:', gamesData);

                const container = document.getElementById('gameContainer');

                // Ensure games data is an array
                if (!Array.isArray(gamesData)) {
                    throw new Error('Fetched data is not an array');
                }

                gamesData.forEach(game => {
                    const tile = document.createElement('div');
                    tile.className = 'game-tile';
                    tile.onclick = () => window.location.href = game.url;

                    const img = document.createElement('img');
                    img.src = game.image;
                    img.alt = game.name;

                    const info = document.createElement('div');
                    info.className = 'game-info';

                    const title = document.createElement('h3');
                    title.className = 'game-title';
                    title.textContent = game.name;

                    const description = document.createElement('p');
                    description.className = 'game-description';
                    description.textContent = game.description;

                    info.appendChild(title);
                    info.appendChild(description);
                    tile.appendChild(img);
                    tile.appendChild(info);
                    container.appendChild(tile);
                });
            } catch (error) {
                console.error('Failed to fetch or process games data:', error);

                // Display an error message to the user
                const container = document.getElementById('gameContainer');
                container.innerHTML = '<p style="color: red;">Failed to load games. Please try again later.</p>';
            }
        }

        // Fetch and load games
        fetchGames();
    </script>
</body>
</html>
