<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap'); /* Import Poppins font */

        body {
            background-color: #1c1c1c;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-y: hidden; /* Hide scrollbar */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
        }
        .game-container {
            display: grid; /* Use grid layout for precise control */
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); /* Increase minimum size of tiles */
            gap: 30px; /* Slightly larger gap between tiles */
            padding: 20px; /* Larger padding around the edge */
            width: 90%; /* Fixed width for the container */
            height: 80%; /* Fixed height for the container */
            overflow: hidden;
        }
        .game-tile {
            position: relative;
            width: 100%; /* Ensure tiles fill their grid cells */
            aspect-ratio: 16 / 9; /* Enforce 16:9 aspect ratio */
            background-color: #333;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: box-shadow 0.4s ease; /* Smooth transition for the outline */
        }
        .game-tile:hover {
            box-shadow: 0 0 10px 4px rgba(0, 255, 255, 0.8), 0 0 20px 8px rgba(0, 255, 0, 0.8); /* Green-to-blue gradient outline */
        }
        .game-tile img {
            width: 100%;
            height: 100%; /* Match the tile's height */
            object-fit: cover;
        }
        .game-info {
            position: absolute;
            bottom: -50px; /* Start below the tile */
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            opacity: 0;
            transform: translateY(20px); /* Start slightly offset */
            transition: opacity 0.4s ease, transform 0.4s ease; /* Smooth animation */
        }
        .game-tile:hover .game-info {
            opacity: 1; /* Fade in */
            transform: translateY(0); /* Slide into view */
            bottom: 0; /* Align to the bottom */
        }
        .game-title {
            font-family: 'Poppins', sans-serif; /* Use Poppins font */
            font-size: 18px;
            font-weight: bold;
            margin: 0;
        }
        .game-description {
            font-family: 'Poppins', sans-serif; /* Use Poppins font */
            font-size: 14px;
            margin: 5px 0 0;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }
        .pagination button {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }
        .pagination button:hover {
            background-color: #555;
        }
        .pagination button:disabled {
            background-color: #222;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer"></div>
    <div class="pagination">
        <button id="prevButton" disabled>Previous</button>
        <button id="nextButton">Next</button>
    </div>
    <script>
        const ITEMS_PER_PAGE = 12; // Number of tiles per page
        let currentPage = 1;
        let gamesData = [];

        async function fetchGames() {
            try {
                const response = await fetch('https://zonikyo.github.io/scripts/games-data.js');
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                const scriptText = await response.text();
                gamesData = new Function(`${scriptText}; return gamesData;`)();
                renderPage();
            } catch (error) {
                console.error('Failed to fetch or process games data:', error);
                const container = document.getElementById('gameContainer');
                container.innerHTML = '<p style="color: red;">Failed to load games. Please try again later.</p>';
            }
        }

        function renderPage() {
            const container = document.getElementById('gameContainer');
            container.innerHTML = ''; // Clear the container
            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const endIndex = startIndex + ITEMS_PER_PAGE;
            const pageItems = gamesData.slice(startIndex, endIndex);

            pageItems.forEach(game => {
                const tile = document.createElement('div');
                tile.className = 'game-tile';
                tile.onclick = () => window.location.href = game.url;

                const img = document.createElement('img');
                img.src = game.image;
                img.alt = game.name;

                const info = document.createElement('div');
                info.className = 'game-info';

                const title = document.createElement('h3');
                title.className = 'game-title';
                title.textContent = game.name;

                const description = document.createElement('p');
                description.className = 'game-description';
                description.textContent = game.description;

                info.appendChild(title);
                info.appendChild(description);
                tile.appendChild(img);
                tile.appendChild(info);
                container.appendChild(tile);
            });

            updatePaginationButtons();
        }

        function updatePaginationButtons() {
            const prevButton = document.getElementById('prevButton');
            const nextButton = document.getElementById('nextButton');
            prevButton.disabled = currentPage === 1;
            nextButton.disabled = currentPage * ITEMS_PER_PAGE >= gamesData.length;
        }

        document.getElementById('prevButton').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderPage();
            }
        });

        document.getElementById('nextButton').addEventListener('click', () => {
            if (currentPage * ITEMS_PER_PAGE < gamesData.length) {
                currentPage++;
                renderPage();
            }
        });

        fetchGames();
    </script>
</body>
</html>
