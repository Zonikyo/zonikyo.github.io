<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embed with Features</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #1c1c1c;
            overflow: hidden;
        }
        #embedContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 56.25vw; /* 16:9 aspect ratio */
            max-height: calc(100vh - 70px);
            border: none;
            border-radius: 15px;
        }
        #controls {
            display: flex;
            justify-content: space-between;
            position: absolute;
            bottom: 10px;
            left: 0;
            width: calc(100% - 20px);
            padding: 10px;
            box-sizing: border-box;
        }
        .controlButton {
            background-color: #2a2a2a;
            padding: 10px 15px;
            border: 2px solid white;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            color: white;
        }
        .controlButton img {
            width: 24px;
            height: 24px;
            margin-right: 8px;
        }
        .spacer {
            width: 15px;
        }
        #proxyControls {
            display: none;
            flex-direction: column;
            align-items: center;
        }
        #proxyInput {
            padding: 8px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        #proxyDropdown {
            margin-bottom: 10px;
        }
        #okayButton {
            background-color: #2a2a2a;
            padding: 10px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
        #backButton {
            margin-top: 10px;
            cursor: pointer;
            color: white;
        }
    </style>
</head>
<body>

<div id="embedContainer">
    <!-- Embedded Content -->
    <iframe id="embedIframe" src="" scrolling="no"></iframe>
    
    <!-- Control buttons for Popout, Report, Help, and Proxy -->
    <div id="controls">
        <div class="controlButton" id="popoutButton">
            <img src="https://img.icons8.com/ios-filled/50/ffffff/expand-arrow.png" alt="Popout Icon"> Popout
        </div>
        <div class="spacer"></div>
        <div class="controlButton" onclick="openLink('https://example.com/report')">
            <img src="https://zonikyo.github.io/report.png" alt="Report Icon"> Report
        </div>
        <div class="spacer"></div>
        <div class="controlButton" onclick="openLink('https://example.com/help')">
            <img src="https://img.icons8.com/ios-glyphs/30/ffffff/help.png" alt="Help Icon"> Help
        </div>
        <div class="spacer"></div>
        <div class="controlButton" id="proxyButton">
            <img src="https://img.icons8.com/ios-filled/50/ffffff/cloud.png" alt="Cloud Icon"> Apply Proxy
        </div>
    </div>

    <!-- Proxy controls (Text Box, Dropdown, and OK/Back buttons) -->
    <div id="proxyControls">
        <input type="text" id="proxyInput" placeholder="Enter Proxy URL" />
        <select id="proxyDropdown">
            <option value="interstellar">Interstellar</option>
            <option value="ultraviolet">Ultraviolet</option>
            <option value="rammerhead">Rammerhead</option>
        </select>
        <div id="okayButton">Okay</div>
        <div id="backButton">Back</div>
    </div>
</div>

<script>
    // Initial setup to load the correct embed content
    function fetchEmbedInfo() {
        const gameId = 'your-game-id';  // Example placeholder
        const originalEmbedUrl = 'https://turbowarp.org/105500895/embed'; // Placeholder embed URL

        // Check if proxy was applied before
        const savedProxyUrl = localStorage.getItem('proxyUrl');
        const savedProxyType = localStorage.getItem('proxyType');

        if (savedProxyUrl && savedProxyType) {
            applySavedProxy(savedProxyUrl, savedProxyType);
        } else {
            document.getElementById('embedIframe').src = originalEmbedUrl;
        }
    }

    // Apply the saved proxy automatically
    function applySavedProxy(proxyUrl, proxyType) {
        let modifiedUrl = generateProxyUrl(proxyUrl, proxyType);
        document.getElementById('embedIframe').src = modifiedUrl;
        document.getElementById('okayButton').textContent = 'Disconnect';
        document.getElementById('okayButton').classList.add('disconnect');
    }

    // Generate proxy URL based on the type selected
    function generateProxyUrl(proxyUrl, proxyType) {
        switch (proxyType) {
            case 'interstellar':
                return `https://interstellar-proxy.com/service/${proxyUrl}`;
            case 'ultraviolet':
                return `https://ultraviolet-proxy.com/service/${proxyUrl}`;
            case 'rammerhead':
                return `https://rammerhead-proxy.com/service/${proxyUrl}`;
            default:
                return '';
        }
    }

    // Apply the proxy and save the settings
    function applyProxy() {
        const proxyUrl = document.getElementById('proxyInput').value;
        const proxyType = document.getElementById('proxyDropdown').value;

        if (!proxyUrl) {
            alert('Please enter a proxy URL.');
            return;
        }

        const modifiedUrl = generateProxyUrl(proxyUrl, proxyType);
        document.getElementById('embedIframe').src = modifiedUrl;

        // Save proxy settings
        localStorage.setItem('proxyUrl', proxyUrl);
        localStorage.setItem('proxyType', proxyType);

        document.getElementById('okayButton').textContent = 'Disconnect';
        document.getElementById('okayButton').classList.add('disconnect');
    }

    // Disconnect the proxy and reset the embed
    function disconnectProxy() {
        localStorage.removeItem('proxyUrl');
        localStorage.removeItem('proxyType');
        fetchEmbedInfo(); // Reset to original embed
        document.getElementById('okayButton').textContent = 'Okay';
        document.getElementById('okayButton').classList.remove('disconnect');
    }

    // Toggle between showing the proxy controls and the original buttons
    function toggleProxyControls() {
        const controls = document.getElementById('controls');
        const proxyControls = document.getElementById('proxyControls');

        controls.style.display = (controls.style.display === 'none') ? 'flex' : 'none';
        proxyControls.style.display = (proxyControls.style.display === 'none') ? 'flex' : 'none';
    }

    // Event listeners for Proxy button, Okay button, and Back button
    document.getElementById('proxyButton').addEventListener('click', toggleProxyControls);
    document.getElementById('okayButton').addEventListener('click', function() {
        if (this.classList.contains('disconnect')) {
            disconnectProxy();
        } else {
            applyProxy();
        }
    });
    document.getElementById('backButton').addEventListener('click', toggleProxyControls);

    // Fetch initial embed data when page loads
    window.onload = function() {
        fetchEmbedInfo();
    };

    // Helper function to open external links
    function openLink(url) {
        window.open(url, '_blank');
    }
</script>

</body>
</html>
