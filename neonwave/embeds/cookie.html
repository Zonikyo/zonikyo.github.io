<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad to Embed with Proxy Features</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #1c1c1c; 
        }
        iframe {
            width: 100%;
            height: calc(100vh - 70px); 
            border: none;
            border-radius: 15px;
        }
        #controls {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            padding: 10px 20px;
        }
        .controlButton {
            background-color: #2a2a2a; 
            padding: 10px 15px; 
            border: 2px solid white; 
            border-radius: 8px; 
            cursor: pointer;
            display: flex;
            align-items: center; 
            color: white; 
        }
        .controlButton img {
            width: 24px;
            height: 24px;
            margin-right: 8px; 
        }
        .spacer {
            width: 15px; 
        }
        .proxyInput {
            display: none;
            margin-top: 10px;
        }
        .proxyInput input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #2a2a2a;
            color: #1c1c1c;
        }
    </style>

    <script src="https://www.authpro.com/js/auth.js"></script>
    <script>
        var ap = new AuthPro('CoolD1234');
    </script>
    <script type="text/javascript" src="https://www.authpro.com/auth/CoolD1234/?action=pp"></script>
</head>
<body>

<div id="embedContainer">
    <!-- Embedded Content -->
    <iframe id="embedIframe" src="EMBED_URL_HERE" scrolling="no"></iframe>
    
    <!-- Control buttons for Popout, Report, and Proxy -->
    <div id="controls">
        <!-- Popout Button -->
        <div class="controlButton" onclick="popoutEmbed()">
            <img src="https://img.icons8.com/ios-filled/50/ffffff/expand-arrow.png" alt="Popout Icon"> Popout
        </div>
        <div class="spacer"></div>
        <!-- Report Button -->
        <div class="controlButton" onclick="openLink('https://zonikyo.github.io/report.png')">
            <img src="https://zonikyo.github.io/report.png" alt="Report Icon"> Report
        </div>
        <div class="spacer"></div>
        <!-- Proxy Button -->
        <div class="controlButton" onclick="toggleProxyInput()">
            <img src="https://img.icons8.com/ios-glyphs/30/ffffff/cloud.png" alt="Proxy Icon"> Switch Proxy
        </div>
    </div>

    <!-- Proxy Input Field -->
    <div class="proxyInput" id="proxyInput">
        <input type="text" id="proxyUrl" placeholder="Enter your proxy link">
        <button class="controlButton" onclick="applyProxy()">Apply Proxy</button>
    </div>
</div>

<script>
    // Popout Embed
    function popoutEmbed() {
        window.open('https://zonikyo.github.io/neonwave/embeds/example', '_blank');
    }

    // Open external links
    function openLink(url) {
        window.open(url, '_blank');
    }

    // Toggle Proxy Input visibility
    function toggleProxyInput() {
        const proxyInput = document.getElementById('proxyInput');
        proxyInput.style.display = proxyInput.style.display === 'block' ? 'none' : 'block';
    }

    // Apply Proxy
    function applyProxy() {
        const proxyUrl = document.getElementById('proxyUrl').value;
        const embedIframe = document.getElementById('embedIframe');
        
        // Check if the proxy URL is from a supported proxy
        if (proxyUrl.includes('holyunblocker')) {
            embedIframe.src = `${proxyUrl}/games/embed/EMBED_URL_HERE`;
        } else {
            alert("Unsupported proxy type. Please use a supported proxy link.");
        }
        
        // Save proxy setting to localStorage
        localStorage.setItem('proxyUrl', proxyUrl);
    }

    // Load saved proxy setting on page load
    window.onload = function() {
        const savedProxyUrl = localStorage.getItem('proxyUrl');
        if (savedProxyUrl) {
            document.getElementById('proxyUrl').value = savedProxyUrl;
            applyProxy();
        }
    }
</script>

</body>
</html>
