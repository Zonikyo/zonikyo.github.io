<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embed with Features</title>

    <!-- AuthPro Integration -->
    <script src="https://www.authpro.com/js/auth.js"></script>
    <script>
      var ap = new AuthPro('CoolD1234');
    </script>
    <script type="text/javascript" src="https://www.authpro.com/auth/CoolD1234/?action=pp"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #1c1c1c;
            overflow: hidden;
        }
        #embedContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 56.25vw; /* 16:9 aspect ratio */
            max-height: calc(100vh - 70px);
            border: none;
            border-radius: 15px;
            overflow: hidden;
        }
        #loadingMessage {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: white;
        }
        #controls {
            display: flex;
            justify-content: space-between;
            position: absolute;
            bottom: 10px;
            left: 0;
            width: calc(100% - 20px);
            padding: 10px;
            box-sizing: border-box;
        }
        .controlButton {
            background-color: #2a2a2a;
            padding: 10px 15px;
            border: 2px solid white;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            color: white;
        }
        .controlButton img {
            width: 24px;
            height: 24px;
            margin-right: 8px;
        }
        .spacer {
            width: 15px;
        }
        /* Styles for the toggle button */
        .toggleButton {
            background-color: #4a4a4a;
            padding: 10px 15px;
            border: 2px solid white;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            display: inline-flex;
            align-items: center;
        }
        .toggleButton span {
            margin-left: 8px;
        }
    </style>
</head>
<body>

<div id="embedContainer">
    <!-- Embedded Content -->
    <iframe id="embedIframe" src="" scrolling="no"></iframe>
    
    <!-- Control buttons for Popout, Report, and Help -->
    <div id="controls">
        <!-- Popout Button -->
        <div class="controlButton" id="popoutButton">
            <img src="https://img.icons8.com/ios-filled/50/ffffff/expand-arrow.png" alt="Popout Icon"> Popout
        </div>
        <div style="flex-grow: 1;"></div> <!-- Spacer -->
        <!-- Report Button -->
        <div class="controlButton" onclick="openLink('https://example.com/report')">
            <img src="https://zonikyo.github.io/report.png" alt="Report Icon"> Report
        </div>
        <div class="spacer"></div>
        <!-- Help Button -->
        <div class="controlButton" onclick="openLink('https://example.com/help')">
            <img src="https://img.icons8.com/ios-glyphs/30/ffffff/help.png" alt="Help Icon"> Help
        </div>
    </div>

    <!-- Toggle for Normal/Proxied mode -->
    <div id="toggleContainer" style="position: absolute; bottom: 50px; left: 10px;">
        <div class="toggleButton" id="toggleModeButton">
            <span id="toggleText">Normal Mode</span>
        </div>
    </div>
</div>

<script>
    // Function to fetch embed information
    function fetchEmbedInfo() {
        const urlParts = window.location.pathname.split('/');
        const gameId = urlParts[urlParts.length - 1];

        fetch('embeds.json') // Load the external JSON file
            .then(response => response.json())
            .then(data => {
                if (data[gameId]) {
                    const embedInfo = data[gameId];
                    document.getElementById('embedIframe').src = getEmbedUrl(embedInfo.embedUrl);

                    document.getElementById('loadingMessage').textContent = embedInfo.title;

                    // Set the popout button action dynamically
                    document.getElementById('popoutButton').onclick = function() {
                        window.open(embedInfo.popoutUrl, '_blank');
                    };
                } else {
                    console.error('Game not found:', gameId);
                    document.getElementById('loadingMessage').textContent = 'Game not found';
                }
            })
            .catch(error => {
                console.error('Error fetching embed data:', error);
            });
    }

    // Function to determine if Proxied Mode is enabled
    function isProxiedModeEnabled() {
        return localStorage.getItem('proxiedMode') === 'true';
    }

    // Function to update the iframe URL based on the mode
    function getEmbedUrl(normalUrl) {
        if (isProxiedModeEnabled()) {
            const proxiedUrl = `https://translate.google.com/translate?sl=auto&tl=en&u=${encodeURIComponent(normalUrl)}`;
            return proxiedUrl;
        } else {
            return normalUrl;
        }
    }

    // Function to toggle between Normal and Proxied modes
    function toggleMode() {
        const proxiedMode = isProxiedModeEnabled();
        if (proxiedMode) {
            localStorage.setItem('proxiedMode', 'false');
            document.getElementById('toggleText').textContent = 'Normal Mode';
        } else {
            localStorage.setItem('proxiedMode', 'true');
            document.getElementById('toggleText').textContent = 'Proxied Mode';
        }
        fetchEmbedInfo(); // Refresh the iframe with the new URL
    }

    // Initialize toggle button state and fetch embed info
    window.onload = function() {
        if (isProxiedModeEnabled()) {
            document.getElementById('toggleText').textContent = 'Proxied Mode';
        } else {
            document.getElementById('toggleText').textContent = 'Normal Mode';
        }
        document.getElementById('toggleModeButton').addEventListener('click', toggleMode);
        fetchEmbedInfo();
    };

    // Function to open Report or Help links
    function openLink(url) {
        window.open(url, '_blank');
    }
</script>

</body>
</html>
