<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
    <title>Game Sidebar</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: #1c1c1c;
        }

        .sidebar {
            width: 250px;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar h3 {
            color: #fff;
            text-align: center;
            margin-bottom: 20px;
        }

        .game-thumbnail {
            width: 100%;
            height: 140px;
            margin-bottom: 15px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid #fff;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border 0.3s ease;
        }

        .game-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-thumbnail:hover {
            transform: scale(1.05);
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
            border-image: linear-gradient(45deg, #ff0080, #ff8c00, #40e0d0, #ff0080);
            border-image-slice: 1;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>Games you may like</h3>
    <div id="game-list"></div>
</div>

<script>
    const games = [
        { title: "Minecraft", image: "https://zonikyo.github.io/minecraft.png", link: "https://zonikyo.github.io/neonwave/embeds/minecraft" },
        { title: "Geometry Dash", image: "https://zonikyo.github.io/geometry.png", link: "https://zonikyo.github.io/neonwave/embeds/geometry" },
        { title: "Cookie Clicker", image: "https://zonikyo.github.io/cookie.png", link: "https://zonikyo.github.io/neonwave/embeds/cookie" },
        { title: "Bitlife", image: "https://zonikyo.github.io/bitlife.png", link: "https://zonikyo.github.io/neonwave/embeds/bitlife" },
        { title: "MotoX3m", image: "https://zonikyo.github.io/motox3m.png", link: "https://zonikyo.github.io/neonwave/embeds/motox3m" },
        { title: "RetroBowl", image: "https://zonikyo.github.io/retrobowl.png", link: "https://zonikyo.github.io/neonwave/embeds/retrobowl" },
        { title: "Cut the rope", image: "https://zonikyo.github.io/cuttherope.png", link: "https://zonikyo.github.io/neonwave/embeds/cuttherope" },
        { title: "Fruit Ninja", image: "https://zonikyo.github.io/fruitninja.png", link: "https://zonikyo.github.io/neonwave/embeds/fruitninja" },
        { title: "Paper io 2", image: "https://zonikyo.github.io/paperio2.png", link: "https://zonikyo.github.io/neonwave/embeds/paperio2" },
        { title: "Happy Wheels", image: "https://zonikyo.github.io/happywheels.png", link: "https://zonikyo.github.io/neonwave/embeds/happywheels" },
        { title: "Monkey Mart", image: "https://zonikyo.github.io/monkeymart.png", link: "https://zonikyo.github.io/neonwave/embeds/monkeymart" },
        { title: "1v1lol", image: "https://zonikyo.github.io/1v1lol.png", link: "https://zonikyo.github.io/neonwave/embeds/1v1lol" },
        { title: "Run 3", image: "https://zonikyo.github.io/run3.png", link: "https://zonikyo.github.io/neonwave/embeds/run3" },
        { title: "Bloons TD 4", image: "https://zonikyo.github.io/bloonstd4.png", link: "https://zonikyo.github.io/neonwave/embeds/bloonstd4" },
        { title: "Slope", image: "https://zonikyo.github.io/slope.png", link: "https://zonikyo.github.io/neonwave/embeds/slope" },
    ];

    function getRandomGames(games, num) {
        const shuffled = games.sort(() => 0.5 - Math.random());
        return shuffled.slice(0, num);
    }

    function displayRandomGames() {
        const gameList = document.getElementById('game-list');
        const randomGames = getRandomGames(games, 7);

        randomGames.forEach(game => {
            const gameDiv = document.createElement('div');
            gameDiv.classList.add('game-thumbnail');
            gameDiv.innerHTML = `<a href="${game.link}" target="_blank"><img src="${game.image}" alt="${game.title}"></a>`;
            gameList.appendChild(gameDiv);
        });
    }

    // Load random games on page load
    displayRandomGames();
</script>

</body>
</html>
