<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Success</title>
    <style>
        body {
            background-color: #1c1c1c;
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .message {
            font-weight: 700;
            font-size: 1.5rem;
        }
        .redirect-button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: #ffffff;
            font-weight: 700;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .redirect-button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="message" id="message"></div>
    <script>
        // Check if the page is loaded inside an iframe
        if (window.self !== window.top) {
            document.getElementById('message').innerText = "Reload the page to continue.";
        } else {
            document.getElementById('message').innerHTML = `
                Successfully logged in!<br>
                <a href="https://sites.google.com/view/neonwave" class="redirect-button">Go to Homepage</a>
            `;
        }
    </script>
</body>
</html>
