<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Embed</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #1c1c1c; /* Set background to blend with the website */
            overflow: hidden; /* Prevent scrolling of the body */
        }
        #adContainer, #embedContainer {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        #embedIframe {
            width: 100%; 
            height: calc(100% - 70px); /* Adjust height to leave space for buttons */
            max-height: calc(100vw * 9 / 16); /* Maintain 16:9 aspect ratio */
            border: none;
            border-radius: 15px; /* Rounded corners for the embed */
            overflow: hidden; /* Prevent scrolling within the iframe */
        }
        #loadingText {
            position: absolute;
            bottom: 0;
            width: 100%;
            text-align: center;
            font-weight: 700;
            font-size: 16px;
            padding: 10px 0;
            background-color: #1c1c1c;
            color: white;
        }
        #loadingMessage {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: white; /* White text */
        }
        #popoutButton {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #2a2a2a; /* Button color */
            border: 2px solid white; /* White outline */
            border-radius: 8px; /* Rounded corners */
            color: white; /* White text */
            padding: 10px 15px; /* Padding for the button */
            cursor: pointer; /* Pointer cursor on hover */
            z-index: 10; /* Ensure the button is above other elements */
        }
        #popoutButton img {
            width: 20px; /* Adjust icon size */
            height: 20px; /* Adjust icon size */
            vertical-align: middle; /* Center icon vertically */
            margin-right: 5px; /* Space between icon and text */
        }
    </style>
</head>
<body>

<div id="loadingMessage">Your Game is loading... please wait</div>

<div id="adContainer">
    <!-- Google Ad -->
    <iframe id="adIframe" src="AD_CODE_HERE"></iframe>
    <!-- Loading text -->
    <div id="loadingText">Ad is loading...</div>
</div>

<div id="embedContainer" style="display: none;">
    <!-- Popout Button -->
    <div id="popoutButton" onclick="window.open('https://zonikyo.github.io/neonwave/embeds/geometry', '_blank')">
        <img src="https://img.icons8.com/ios-glyphs/30/ffffff/pop-out.png" alt="Popout Icon"> Popout
    </div>

    <!-- Embedded Content -->
    <iframe id="embedIframe" src="https://turbowarp.org/105500895/embed" scrolling="no"></iframe>
</div>

<script>
    // Automatically hide ad and show embed after 10 seconds
    setTimeout(function() {
        skipAd();
    }, 10000);

    // Function to skip ad and show the embed content
    function skipAd() {
        document.getElementById('adContainer').style.display = 'none';
        document.getElementById('embedContainer').style.display = 'block';
        document.getElementById('loadingMessage').style.display = 'none'; // Hide loading message after ad
    }
</script>

</body>
</html>
