<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Button Embed</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1c1c1c;
            font-family: 'Poppins', sans-serif;
        }
        .share-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .share-button, .social-buttons {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .share-button {
            padding: 15px 30px;
            background-color: #fff;
            color: #1c1c1c;
            font-size: 18px;
            font-weight: 700;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .share-button:hover {
            background-color: #444;
            color: #fff;
        }
        .social-buttons {
            display: none;
            flex-direction: row;
            gap: 10px;
        }
        .social-icon {
            padding: 10px;
            background-color: #fff;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .social-icon:hover {
            background-color: #444;
        }
    </style>
</head>
<body>
    <div class="share-container">
        <button class="share-button" id="shareButton">
            <span>Share</span>
            <img src="https://zonikyo.github.io/share.png" alt="Share Icon" width="20">
        </button>

        <div class="social-buttons" id="socialButtons">
            <div class="social-icon" onclick="window.open('https://twitter.com/share', '_blank')">
                <img src="twitter.png" alt="Twitter" width="20">
            </div>
            <div class="social-icon" onclick="window.open('https://www.tiktok.com/', '_blank')">
                <img src="tiktok.png" alt="TikTok" width="20">
            </div>
            <div class="social-icon" onclick="window.open('https://www.youtube.com/', '_blank')">
                <img src="youtube.png" alt="YouTube" width="20">
            </div>
            <div class="social-icon" onclick="window.open('https://www.facebook.com/', '_blank')">
                <img src="facebook.png" alt="Facebook" width="20">
            </div>
            <div class="social-icon" onclick="window.open('https://www.reddit.com/', '_blank')">
                <img src="reddit.png" alt="Reddit" width="20">
            </div>
            <div class="social-icon" onclick="copyToClipboard('https://your-preset-link.com')">
                <img src="copy-link.png" alt="Copy Link" width="20">
            </div>
        </div>
    </div>

    <script>
        const shareButton = document.getElementById('shareButton');
        const socialButtons = document.getElementById('socialButtons');

        shareButton.addEventListener('click', () => {
            shareButton.style.opacity = '0';
            shareButton.style.transform = 'scale(0.8)';
            setTimeout(() => {
                shareButton.style.display = 'none';
                socialButtons.style.display = 'flex';
                socialButtons.style.opacity = '1';
            }, 400);
        });

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Link copied to clipboard!');
            });
        }
    </script>
</body>
</html>
