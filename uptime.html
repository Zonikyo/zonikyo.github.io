<!DOCTYPE html>
<html>
    <head>
        <div id="head-placeholder"></div>
        <script src="/scripts/common.js"></script>
    </head>
    <body>
        <div id="navbar-placeholder"></div>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                document.getElementById('nav-uptime').classList.add('active');
            });
        </script>
        <div class="welcome-msg">
            <h1 class="welcome-msg-text">Uptime Status</h1>
            <p class="inline-text-welcome-msg">Check if the NeonWave servers are <p class="inline-text-welcome-msg-gradient">online</p>. This tool also checks authpro.com, which manages all NeonWave accounts.</p>
            <p class="welcome-msg-text">If the servers are online, and the functions are still not working, try visiting both neonwave.netlify.app and www.authpro.com</p>
        </div>
        <div style="display: flex;">
            <iframe src="https://check-host.net/check-ping?host=authpro.com" style="flex: 1; height: 500px;" frameborder="0"></iframe>
            <iframe src="https://check-host.net/check-ping?host=neonwave.netlify.app" style="flex: 1; height: 500px;" frameborder="0"></iframe>
        </div>
        <script src="/scripts/uptime.js"></script>
    </body>
</html>
