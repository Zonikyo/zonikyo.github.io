<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Checker</title>
    <style>
        body {
            background-color: #1c1c1c;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            color: white;
            padding: 20px;
        }

        h1 {
            color: #ffffff;
            text-align: center;
        }

        .url-list {
            margin: 20px 0;
            padding: 0;
            list-style: none;
        }

        .url-item {
            padding: 10px;
            border: 1px solid #333;
            border-radius: 8px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #2a2a2a;
        }

        .status {
            font-size: 16px;
            font-weight: bold;
        }

        .green {
            color: #00ff00;
        }

        .red {
            color: #ff0000;
        }

        .orange {
            color: #ffa500;
        }

        a {
            color: #00ff00;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Proxy Status Checker</h1>
    <ul class="url-list" id="proxy-list">
        <li class="url-item">
            <span class="url"><a href="https://exampleproxy1.com" target="_blank">https://exampleproxy1.com</a></span>
            <span class="status green">Test Connection</span>
        </li>
        <li class="url-item">
            <span class="url"><a href="https://exampleproxy2.com" target="_blank">https://exampleproxy2.com</a></span>
            <span class="status red">Blocked or Insecure</span>
        </li>
        <li class="url-item">
            <span class="url"><a href="https://exampleproxy3.com" target="_blank">https://exampleproxy3.com</a></span>
            <span class="status orange">Blocked or Down</span>
        </li>
    </ul>

    <script>
        // Since direct URL status checking isn't allowed client-side due to CORS, 
        // we're simulating statuses and giving users the option to test the connection manually.
        // A server-side solution would be ideal for real URL checking.
    </script>
</body>
</html>
