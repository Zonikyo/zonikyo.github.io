<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy List</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1c1c1c;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            margin: 0;
            padding: 0;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
            margin-top: 20px;
        }
        .reload-btn {
            background-color: #ffffff;
            color: #1c1c1c;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .reload-btn:hover {
            background-color: #cccccc;
        }
        .proxy-list {
            width: 90%;
            max-width: 800px;
            border-collapse: collapse;
        }
        .proxy-list th, .proxy-list td {
            border: 1px solid #ffffff;
            padding: 10px;
            text-align: left;
        }
        .proxy-list th {
            background-color: #333333;
        }
        .proxy-list tr:nth-child(even) {
            background-color: #2c2c2c;
        }
        .proxy-list tr:nth-child(odd) {
            background-color: #3c3c3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Available HTTP/HTTPS Proxies</h1>
        <button class="reload-btn" onclick="loadProxies()">Reload Proxies</button>
        <table class="proxy-list">
            <thead>
                <tr>
                    <th>IP Address</th>
                    <th>Port</th>
                    <th>Protocol</th>
                </tr>
            </thead>
            <tbody id="proxy-table-body">
                <!-- Proxies will be populated here -->
            </tbody>
        </table>
    </div>

    <script>
        const apiKey = 'AdjFLTZLUwdHAwShJ6r8GespB8YeWmVXK4vF81d4QuXH';

        function loadProxies() {
            fetch(`https://proxify.io/api/proxy/list?key=${apiKey}`)
                .then(response => response.json())
                .then(data => {
                    const proxyTableBody = document.getElementById('proxy-table-body');
                    proxyTableBody.innerHTML = ''; // Clear existing proxies

                    data.proxies.forEach(proxy => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${proxy.ip}</td>
                            <td>${proxy.port}</td>
                            <td>${proxy.protocol}</td>
                        `;
                        proxyTableBody.appendChild(row);
                    });
                })
                .catch(error => {
                    console.error('Error fetching proxies:', error);
                });
        }

        // Initial load of proxies
        loadProxies();
    </script>
</body>
</html>
