<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Checker</title>
    <style>
        body {
            background-color: #1c1c1c;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            color: white;
            padding: 20px;
        }

        h1 {
            color: #ffffff;
            text-align: center;
        }

        .url-list {
            margin: 20px 0;
            padding: 0;
            list-style: none;
        }

        .url-item {
            padding: 10px;
            border: 1px solid #333;
            border-radius: 8px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #2a2a2a;
        }

        .status {
            font-size: 16px;
            font-weight: bold;
        }

        .green {
            color: #00ff00;
        }

        .red {
            color: #ff0000;
        }

        .orange {
            color: #ffa500;
        }
    </style>
</head>
<body>
    <h1>Proxy Status Checker</h1>
    <ul class="url-list" id="proxy-list">
        <li class="url-item">
            <span class="url">https://exampleproxy1.com</span>
            <span class="status" id="status1">Checking...</span>
        </li>
        <li class="url-item">
            <span class="url">https://exampleproxy2.com</span>
            <span class="status" id="status2">Checking...</span>
        </li>
        <li class="url-item">
            <span class="url">https://exampleproxy3.com</span>
            <span class="status" id="status3">Checking...</span>
        </li>
        <li class="url-item">
            <span class="url">https://www.proxysite.com</span>
            <span class="status" id="status4">Checking...</span>
        </li>
    </ul>

    <script>
        const proxies = [
            { url: 'https://exampleproxy1.com', statusId: 'status1' },
            { url: 'https://exampleproxy2.com', statusId: 'status2' },
            { url: 'https://exampleproxy3.com', statusId: 'status3' },
            { url: 'https://www.proxysite.com', statusId: 'status4' }
        ];

        proxies.forEach(proxy => {
            checkProxy(proxy.url, proxy.statusId);
        });

        function checkProxy(url, statusId) {
            const xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.timeout = 5000; // Set a timeout to handle unresponsive URLs

            xhr.onload = function () {
                if (xhr.status >= 200 && xhr.status < 300) {
                    document.getElementById(statusId).textContent = 'Can Connect';
                    document.getElementById(statusId).classList.add('green');
                } else if (xhr.status === 0 || xhr.status >= 400) {
                    document.getElementById(statusId).textContent = 'Blocked or Down';
                    document.getElementById(statusId).classList.add('orange');
                }
            };

            xhr.onerror = function () {
                document.getElementById(statusId).textContent = 'Blocked';
                document.getElementById(statusId).classList.add('red');
            };

            xhr.ontimeout = function () {
                document.getElementById(statusId).textContent = 'Blocked or Down';
                document.getElementById(statusId).classList.add('orange');
            };

            xhr.send();
        }
    </script>
</body>
</html>
