<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Checker with Iframes</title>
    <style>
        body {
            background-color: #1c1c1c;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            color: white;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 20px;
        }

        .iframe-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }

        .iframe-box {
            margin: 10px;
            width: calc(100% / 7 - 20px);
        }

        iframe {
            width: 100%;
            height: 150px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .button {
            margin-top: 10px;
            display: block;
            width: 100%;
            background-color: #00ff00;
            border: none;
            color: #1c1c1c;
            padding: 10px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
        }

        .button:hover {
            background-color: #00cc00;
        }

        #refresh {
            background-color: #ffa500;
            padding: 10px 20px;
            margin: 20px 0;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }

        #refresh:hover {
            background-color: #ff8c00;
        }
    </style>
</head>
<body>
    <h1>Proxy Status Checker</h1>
    <button id="refresh" onclick="location.reload()">Refresh</button>
    
    <div class="iframe-container">
        <!-- Example Iframes (you can easily manage the list here) -->
        <div class="iframe-box">
            <iframe src="https://exampleproxy1.com" onload="iframeStatus(this)" onerror="iframeError(this)"></iframe>
            <a href="https://exampleproxy1.com" class="button" target="_blank">Visit Proxy 1</a>
        </div>
        <div class="iframe-box">
            <iframe src="https://exampleproxy2.com" onload="iframeStatus(this)" onerror="iframeError(this)"></iframe>
            <a href="https://exampleproxy2.com" class="button" target="_blank">Visit Proxy 2</a>
        </div>
        <div class="iframe-box">
            <iframe src="https://exampleproxy3.com" onload="iframeStatus(this)" onerror="iframeError(this)"></iframe>
            <a href="https://exampleproxy3.com" class="button" target="_blank">Visit Proxy 3</a>
        </div>
        <!-- Add more iframe boxes as needed -->
    </div>

    <script>
        function iframeStatus(iframe) {
            iframe.style.border = "3px solid #00ff00"; // Green border for successful load
        }

        function iframeError(iframe) {
            iframe.style.border = "3px solid #ff0000"; // Red border for error (blocked or down)
        }
    </script>
</body>
</html>
