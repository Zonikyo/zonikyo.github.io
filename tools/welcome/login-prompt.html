<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Required</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1c1c1c;
            font-family: 'Poppins', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            width: 80%;
            max-width: 400px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
            background-color: #252525;
        }
        .login-prompt {
            font-size: 18px;
            color: white;
            margin-bottom: 20px;
        }
        .login-prompt a {
            color: #00bfff;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            border: 2px solid #00bfff;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }
        .login-prompt a:hover {
            background-color: #00bfff;
            color: #1c1c1c;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-prompt">
            <p>You need to log in or sign up to access this content.</p>
            <a href="https://authpro.com/auth/CoolD1234">Log In / Sign Up</a>
        </div>
    </div>
</body>
</html>
