<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Suggestion</title>
    <style>
        body {
            background-color: #1c1c1c;
            font-family: 'Poppins', sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #message {
            font-size: 24px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="message">Loading...</div>

    <script>
        async function getUsername() {
            const apiUrl = 'https://api.authpro.com/v1/user'; // Replace with actual AuthPro endpoint
            const apiKey = '4z49ge54sp271i7u'; // Your API key
            const username = 'CoolD1234'; // Your AuthPro username

            try {
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }

                const data = await response.json();
                const userName = data.user.username || username; // Fallback to provided username if not found
                document.getElementById('message').innerText = `What would you like to play, ${userName}?`;
            } catch (error) {
                console.error('There was a problem with the fetch operation:', error);
                document.getElementById('message').innerText = 'Error loading username.';
            }
        }

        getUsername();
    </script>
</body>
</html>
